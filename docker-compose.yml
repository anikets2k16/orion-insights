services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      ORION_TASK_BACKEND: celery       # dispatch research to Redis-backed workers
      ORION_SESSION_BACKEND: redis      # share session state with workers
    depends_on: [postgres, redis]
    volumes: ["./reports:/app/reports", "./.cache:/app/.cache"]
    restart: unless-stopped

  worker:
    build: .
    command: celery -A observability.celery_app worker --loglevel=info --concurrency=4 -Q research_tasks
    env_file: .env
    environment:
      ORION_SESSION_BACKEND: redis
    depends_on: [postgres, redis]
    volumes: ["./reports:/app/reports", "./.cache:/app/.cache"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion_dev}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

volumes:
  postgres_data:
  redis_data:
