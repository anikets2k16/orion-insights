apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-api
  labels: {app: orion-api}
spec:
  replicas: 2
  selector:
    matchLabels: {app: orion-api}
  template:
    metadata:
      labels: {app: orion-api}
    spec:
      containers:
        - name: api
          image: gcr.io/YOUR_PROJECT/orion-api:latest
          ports: [{containerPort: 8000}]
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "1", memory: 2Gi}
          livenessProbe:
            httpGet: {path: /api/health, port: 8000}
            initialDelaySeconds: 30
            periodSeconds: 10
          envFrom:
            - secretRef: {name: orion-secrets}
---
apiVersion: v1
kind: Service
metadata:
  name: orion-api
spec:
  selector: {app: orion-api}
  ports: [{port: 80, targetPort: 8000}]
